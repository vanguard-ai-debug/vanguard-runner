apiVersion: v1
kind: Service
metadata:
  name: vanguard-runner-master
  namespace: default
  labels:
    app: vanguard-runner
    component: master
spec:
  type: ClusterIP
  ports:
  - port: 8100
    targetPort: 8100
    protocol: TCP
    name: http
  selector:
    app: vanguard-runner
    component: master
---
apiVersion: v1
kind: Service
metadata:
  name: vanguard-runner-master-nodeport
  namespace: default
  labels:
    app: vanguard-runner
    component: master
spec:
  type: NodePort
  ports:
  - port: 8100
    targetPort: 8100
    nodePort: 30100  # 可以根据需要调整
    protocol: TCP
    name: http
  selector:
    app: vanguard-runner
    component: master
